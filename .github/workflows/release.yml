name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Swift app
        run: |
          xcodebuild \
            -project CalNotionBar/CalNotionBar.xcodeproj \
            -scheme CalNotionBar \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO | xcpretty || true
          
          APP_PATH=$(find build -name "CalNotionBar.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" ./CalBridge.app

      - name: Create .dmg
        run: |
          mkdir -p dmg_contents
          cp -r CalBridge.app dmg_contents/
          ln -s /Applications dmg_contents/Applications
          hdiutil create \
            -volname "CalBridge" \
            -srcfolder dmg_contents \
            -ov \
            -format UDZO \
            "CalBridge-${{ github.ref_name }}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: CalBridge-${{ github.ref_name }}.dmg
          body: |
            ## CalBridge ${{ github.ref_name }}

            ### Install
            1. Download `CalBridge-${{ github.ref_name }}.dmg`
            2. Open the DMG and drag `CalBridge.app` to Applications
            3. Run `scripts/install.sh` to configure credentials
            4. Launch from Applications

            See [README](https://github.com/dkeg/cal-bridge#readme) for full setup guide.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
